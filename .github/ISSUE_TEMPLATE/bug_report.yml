---
name: Bug Report
description: Report a bug in the AI agent configuration or skills
title: "[Bug] "
labels: ["bug", "needs-triage"]
assignees:
  - "cbwinslow"

body:
  - type: markdown
    attributes:
      value: |
        Help us improve! Please provide detailed information about the bug.
        
  - type: input
    id: summary
    attributes:
      label: Bug Summary
      description: A clear, concise description of the bug
      placeholder: "Agent crashes when..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      value: |
        1. Go to '...'
        2. Run command '....'
        3. See error '....'
      placeholder: "1. ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages and logs
      placeholder: "Instead, ..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Agent, OS, version information
      value: |
        - Agent: [e.g., OpenCode, Claude Code, etc.]
        - Version/Commit: 
        - OS: [e.g., Ubuntu 24.04]
        - Shell: [e.g., Zsh 5.9]
        - Letta server: [yes/no, version]
      placeholder: |
        - Agent:
        - Version:
        - OS:
        - Shell:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Include any error logs or screenshots
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: affected-agents
    attributes:
      label: Affected Agents
      description: Which agent(s) exhibit this bug?
      options:
        - label: OpenCode
        - label: Claude Code
        - label: Cline
        - label: KiloCode
        - label: Codex
        - label: Gemini
        - label: Qwen
        - label: OpenClaw
        - label: Skills
    validations:
      required: true
