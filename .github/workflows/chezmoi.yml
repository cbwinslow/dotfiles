name: Chezmoi Validation

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Chezmoi
        run: |
          curl -sfL https://get.chezmoi.io | sh
          ~/bin/chezmoi doctor
          
      - name: Validate Configuration (dry-run)
        run: |
          # Dry-run apply to check for syntax errors and template issues
          ~/bin/chezmoi apply --dry-run
          # Doctor checks system compatibility
          ~/bin/chezmoi doctor
      
      - name: Check for secrets
        run: |
          if grep -r "password\|secret\|token\|key" --include="*.tmpl" --include="*.yaml" --include="*.toml" . | grep -v "# "; then
            echo "⚠️  Found potential secrets in configuration files"
            exit 1
          fi
          echo "✓ No obvious secrets found in configuration files"
