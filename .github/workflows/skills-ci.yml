name: Skill Test & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - "dotfiles/ai/agents/**"
      - "dotfiles/ai/shared/skills/**"
      - "dotfiles/ai/skills/**"
      - "dotfiles/ai/scripts/**"
      - "dotfiles/ai/tools/**"
      - ".github/workflows/skills-ci.yml"
  workflow_dispatch:
    inputs:
      agent:
        description: "Run tests for a specific agent only (leave blank for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - kilocode
          - opencode
          - cline
          - openclaw
          - gemini
          - qwen
          - codex
          - vscode
          - windsurf

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTFILES_AI: dotfiles/ai
  PYTHON_VERSION: "3.11"

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1 — lint & structure validation (fast, runs first for all agents)
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  validate-structure:
    name: Validate Agent Structure
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.detect.outputs.agents }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install yaml/toml libs
        run: pip install pyyaml toml

      - name: Detect changed or targeted agents
        id: detect
        run: |
          AGENTS=(kilocode opencode cline openclaw gemini qwen codex vscode windsurf)
          TARGET="${{ github.event.inputs.agent }}"

          if [[ -n "$TARGET" ]]; then
            echo "agents=[\"$TARGET\"]" >> "$GITHUB_OUTPUT"
          else
            echo "agents=$(printf '%s\n' "${AGENTS[@]}" | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate agent config.yaml files
        run: |
          python3 - <<'PYEOF'
          import sys, yaml
          from pathlib import Path

          agents = ["kilocode","opencode","cline","openclaw","gemini","qwen","codex","vscode","windsurf"]
          base   = Path("dotfiles/ai/agents")
          errors = []

          REQUIRED_KEYS = {"name", "framework", "tools", "skills"}

          for agent in agents:
              cfg = base / agent / "config.yaml"
              if not cfg.exists():
                  errors.append(f"[{agent}] config.yaml missing at {cfg}")
                  continue
              try:
                  data = yaml.safe_load(cfg.read_text())
              except yaml.YAMLError as exc:
                  errors.append(f"[{agent}] YAML parse error: {exc}")
                  continue

              for key in REQUIRED_KEYS:
                  if key not in data:
                      errors.append(f"[{agent}] config.yaml missing required key: '{key}'")

              if not isinstance(data.get("tools"), list) or len(data["tools"]) == 0:
                  errors.append(f"[{agent}] 'tools' must be a non-empty list")
              if not isinstance(data.get("skills"), list) or len(data["skills"]) == 0:
                  errors.append(f"[{agent}] 'skills' must be a non-empty list")

          if errors:
              print("STRUCTURE ERRORS:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)
          else:
              print(f"✓ All {len(agents)} agent config.yaml files are valid")
          PYEOF

      - name: Validate shared skills registry
        run: |
          python3 - <<'PYEOF'
          import sys, yaml, json
          from pathlib import Path

          errors = []

          # shared registry YAML
          reg_yaml = Path("dotfiles/ai/shared/skills/registry.yaml")
          if reg_yaml.exists():
              try:
                  yaml.safe_load(reg_yaml.read_text())
                  print(f"✓ {reg_yaml} is valid YAML")
              except yaml.YAMLError as exc:
                  errors.append(f"registry.yaml: {exc}")
          else:
              errors.append("shared/skills/registry.yaml not found")

          # skills registry JSON
          reg_json = Path("dotfiles/ai/skills/registry.json")
          if reg_json.exists():
              try:
                  data = json.loads(reg_json.read_text())
                  count = data.get("skills_count", 0)
                  actual = len(data.get("skills", []))
                  if count != actual:
                      errors.append(f"registry.json: skills_count={count} but {actual} entries found")
                  else:
                      print(f"✓ registry.json valid — {actual} skills registered")
              except json.JSONDecodeError as exc:
                  errors.append(f"registry.json: {exc}")
          else:
              errors.append("skills/registry.json not found")

          if errors:
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)
          PYEOF

      - name: Check for secrets/credentials accidentally committed
        run: |
          if git log -1 --name-only --format="" | xargs -I{} sh -c \
            'test -f "{}" && grep -lE "(api_key|api_secret|password|token|private_key)\s*=\s*[\"'"'"'][^\"'"'"']{8,}" "{}" 2>/dev/null' \
            | grep -v ".tmpl" | grep -v ".example" | grep .; then
            echo "::error::Potential hardcoded secrets detected — check the files listed above"
            exit 1
          fi
          echo "✓ No obvious hardcoded secrets found"

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 2 — per-agent skill tests (matrix, parallelised)
  # ──────────────────────────────────────────────────────────────────────────────
  test-skills:
    name: "Test: ${{ matrix.agent }}"
    needs: validate-structure
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.validate-structure.outputs.agents) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml toml pytest pytest-json-report

      - name: Run skill validator for ${{ matrix.agent }}
        id: skill_test
        run: |
          python3 dotfiles/ai/scripts/validate_skills.py \
            --agent "${{ matrix.agent }}" \
            --repo-root . \
            --output-json /tmp/result-${{ matrix.agent }}.json

      - name: Upload test result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-test-${{ matrix.agent }}
          path: /tmp/result-${{ matrix.agent }}.json

  # ──────────────────────────────────────────────────────────────────────────────
  # JOB 3 — SKILL.md coverage check across all shared skills
  # ──────────────────────────────────────────────────────────────────────────────
  skill-md-coverage:
    name: SKILL.md Coverage
    needs: validate-structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SKILL.md presence in shared skills
        run: |
          python3 - <<'PYEOF'
          import sys
          from pathlib import Path

          roots = [
              Path("dotfiles/ai/shared/skills"),
              Path("dotfiles/ai/skills"),
          ]
          missing = []
          found   = []

          for root in roots:
              if not root.exists():
                  continue
              for d in sorted(root.iterdir()):
                  if d.is_dir() and not d.name.startswith("."):
                      md = d / "SKILL.md"
                      if md.exists():
                          found.append(str(d))
                      else:
                          missing.append(str(d))

          print(f"✓ Skills with SKILL.md : {len(found)}")
          if missing:
              print(f"✗ Skills missing SKILL.md ({len(missing)}):")
              for m in missing:
                  print(f"    {m}")
              sys.exit(1)
          PYEOF

# ──────────────────────────────────────────────────────────────────────────────
# JOB 4 — deploy (runs only on main after all tests pass)
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Skills
    needs: [test-skills, skill-md-coverage]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: skill-test-*
          path: /tmp/results/

      - name: Print deployment summary
        run: |
          python3 - <<'PYEOF'
          import json, sys
          from pathlib import Path

          results_dir = Path("/tmp/results")
          passed = []
          failed = []

          for f in sorted(results_dir.rglob("*.json")):
              try:
                  data = json.loads(f.read_text())
                  agent = data.get("agent", f.stem)
                  if data.get("success"):
                      passed.append(agent)
                  else:
                      failed.append((agent, data.get("errors", [])))
              except Exception as exc:
                  failed.append((str(f), [str(exc)]))

          print("=" * 60)
          print("SKILL DEPLOYMENT SUMMARY")
          print("=" * 60)
          for a in passed:
              print(f"  ✓ {a}")
          for a, errs in failed:
              print(f"  ✗ {a}")
              for e in errs:
                  print(f"      {e}")
          print("=" * 60)
          total = len(passed) + len(failed)
          print(f"  {len(passed)}/{total} agents passed")

          if failed:
              sys.exit(1)
          PYEOF

      - name: Tag successful deploy
        run: |
          # Read version
          VERSION=$(grep '^VERSION=' dotfiles/ai/VERSION | cut -d= -f2)
          if [[ -z "$VERSION" ]]; then
            VERSION="skills-deploy-$(date -u +%Y%m%d-%H%M%S)"
          fi
          
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION" || true
          git push origin "$VERSION" || true
          
          echo "Created tag: $VERSION"

      - name: Update deploy badge
        run: |
          mkdir -p .github/badges
          VERSION=$(grep '^VERSION=' dotfiles/ai/VERSION | cut -d= -f2)
          echo "{\"schemaVersion\":1,\"label\":\"skills\",\"message\":\"$VERSION\",\"color\":\"brightgreen\"}" \
            > .github/badges/skills.json

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/skills.json
          git diff --cached --quiet || \
            git commit -m "chore: update skills deploy badge [skip ci]" && \
            git push origin main || true

      - name: Write release notes draft
        run: |
          # Generate release notes from CHANGELOG
          if [[ -f dotfiles/ai/CHANGELOG.md ]]; then
            VERSION=$(grep '^VERSION=' dotfiles/ai/VERSION | cut -d= -f2)
            # Extract relevant section (first few lines after version header)
            awk "/## \\[${VERSION//./\\.}/,/^## \\[/ {print}" dotfiles/ai/CHANGELOG.md > /tmp/release-notes.md || true
            
            if [[ -s /tmp/release-notes.md ]]; then
              echo "Release notes generated for $VERSION"
              cat /tmp/release-notes.md
            fi
          fi
