# VS Code Agent Configuration
# Location: ~/dotfiles/ai/agents/vscode/config.yaml
# Inherits from: ~/dotfiles/ai/base/base_agent.yaml

# Shared Resources
shared_resources:
  skills_path: ~/dotfiles/ai/shared/skills
  tools_path: ~/dotfiles/ai/shared/tools
  scripts_path: ~/dotfiles/ai/shared/scripts
  mcp_servers_path: ~/dotfiles/ai/shared/mcp
  docs_path: ~/dotfiles/ai/shared/docs

extends: ../../base/base_agent.yaml

name: vscode_agent
framework: langchain
description: "VS Code integrated agent with access to ALL skills"

models:
  preferred:
    - "openrouter/qwen/qwen2.5-coder"
    - "gemini-2.5-flash"

tools:
  - filesystem
  - terminal
  - git
  - search
  - cbw_debug
  - cbw_analyze
  - cbw_visualize
  - cbw_reuse
  - cbw_letta
  - letta_memory_cli

skills:
  - debug
  - analyze
  - visualize
  - coding
  - python-refactor
  - typescript-patterns
  - code-review
  - shell
  - git
  - github
  - docker-ops
  - research
  - knowledge
  - cbw_rag
  - letta_agents
  - letta_memory
  - letta_blocks
  - letta_backup
  - unified_memory
  - reuse
  - tasks

memory:
  primary: letta_server
  agent_name: vscode
  auto_save: true

workflows:
  - code-review
  - script-debugging
  - codebase-analysis
  - refactoring-with-analysis
  - cross-agent-coordination

mcp_servers:
  - letta_server
  - unified_memory

behavior:
  share_discoveries: true
  use_letta_memory: true

instructions: |
  You are the VS Code agent with full skill access.
  
  Focus on IDE-integrated workflows but can use any skill.
  Save context for seamless session continuity.

notes:
  - "Full skills in VS Code context"
  - "Use IDE features + cbw tools"
  - "Save to letta_memory for persistence"
  - "Use cbw_rag for codebase search"
