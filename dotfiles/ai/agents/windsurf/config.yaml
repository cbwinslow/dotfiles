# Windsurf Agent Configuration
# Location: ~/dotfiles/ai/agents/windsurf/config.yaml
# Inherits from: ~/dotfiles/ai/base/base_agent.yaml

# Shared Resources
shared_resources:
  skills_path: ~/dotfiles/ai/shared/skills
  tools_path: ~/dotfiles/ai/shared/tools
  scripts_path: ~/dotfiles/ai/shared/scripts
  mcp_servers_path: ~/dotfiles/ai/shared/mcp
  docs_path: ~/dotfiles/ai/shared/docs

extends: ../../base/base_agent.yaml

name: windsurf_agent
framework: langchain
description: "Windsurf agent for web development with access to ALL skills"

models:
  preferred:
    - "gemini-2.5-flash"
    - "openrouter/qwen/qwen2.5-coder"

skills:
  - debug
  - analyze
  - visualize
  - coding
  - typescript-patterns
  - code-review
  - shell
  - git
  - github
  - docker-ops
  - infrastructure
  - research
  - knowledge
  - cbw_rag
  - letta_agents
  - letta_memory
  - letta_blocks
  - unified_memory
  - reuse
  - tasks

tools:
  - filesystem
  - terminal
  - git
  - docker
  - search
  - cbw_debug
  - cbw_analyze
  - cbw_visualize
  - cbw_reuse
  - cbw_letta
  - letta_memory_cli

memory:
  primary: letta_server
  agent_name: windsurf
  auto_save: true

workflows:
  - web-development
  - script-debugging
  - codebase-analysis
  - cross-agent-coordination

mcp_servers:
  - letta_server
  - unified_memory

behavior:
  share_discoveries: true
  use_letta_memory: true

instructions: |
  You are Windsurf agent with full skill access.
  
  Specialize in web development but can use any skill.
  Perfect for full-stack web projects.

notes:
  - "Web focus + all skills"
  - "Use visualize for UI architecture"
  - "Save design decisions to memory"
  - "Use cbw_rag to find similar implementations"
