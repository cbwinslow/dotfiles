models:
  preferred:
    - "openrouter/qwen/qwen2.5-coder"
    - "gemini-2.5-flash"

skills:
  - "debug"
  - "analyze"
  - "visualize"
  - "coding"
  - "python-refactor"
  - "code-review"
  - "shell"
  - "git"
  - "github"
  - "docker-ops"
  - "infrastructure"
  - "research"
  - "knowledge"
  - "cbw_rag"                    # Codebase search
