# Skills Registry
# Centralized catalog of all available skills for AI agents
# Location: ~/dotfiles/ai/skills/registry.yaml

# Core Skills (Required for all agents)
core:
  memory_management:
    path: skills/memory
    description: "Letta memory operations - save, search, manage memories"
    required: true
    operations:
      - save_conversation
      - search_memories
      - get_memory_stats
      - delete_memory
      - update_memory
      
  bitwarden_secrets:
    path: skills/bitwarden
    description: "Secure secret management via Bitwarden CLI"
    required: false
    operations:
      - get_secret
      - list_secrets
      - get_login
      - generate_password
      - populate_env
      
  entity_extraction:
    path: skills/integration
    description: "Extract and store entities from conversations"
    required: true
    operations:
      - extract_entities
      - store_entities
      - search_entities
      
  conversation_logging:
    path: skills/memory
    description: "Automatic conversation logging to Letta"
    required: true
    operations:
      - log_conversation
      - extract_decisions
      - extract_action_items
      
  cross_agent_search:
    path: skills/integration
    description: "Search memories across all agents"
    required: true
    operations:
      - search_all_agents
      - share_results
      - request_assistance
      
  server_health:
    path: skills/letta_server
    description: "Monitor Letta server health"
    required: true
    operations:
      - check_health
      - get_stats
      - report_issues
      
  bitwarden_integration:
    path: skills/integration/bitwarden
    description: "Secure access to Bitwarden credentials and API keys"
    required: true
    operations:
      - get_api_key
      - populate_env_file
      - list_vaults
      - search_credentials
      - validate_configuration

# Code Skills
code:
  code_generation:
    path: skills/code_generation
    description: "Generate code in multiple languages"
    required: false
    languages:
      - python
      - javascript
      - typescript
      - bash
      - sql
      
  code_review:
    path: skills/analysis
    description: "Review and analyze code quality"
    required: false
    
  refactoring:
    path: skills/code_generation
    description: "Refactor and optimize code"
    required: false
    
  debugging:
    path: skills/analysis
    description: "Debug and fix code issues"
    required: false

