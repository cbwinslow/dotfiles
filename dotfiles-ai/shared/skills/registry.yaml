# Letta Integration Skills
letta:
  letta_memory:
    path: skills/letta_memory
    description: "Unified Letta memory operations - core, archival, cross-agent search"
    required: true
    operations:
      - before_task
      - after_task
      - store_fact
      - recall
      - update_block
      - view_blocks
      - cross_agent_search
      - health_check

  letta_workflows:
    path: skills/letta_workflows
    description: "Stateful workflow automation backed by Letta memory"
    required: false
    operations:
      - start_workflow
      - update_step
      - check_status
      - resume_workflow
      - log_decision
      - handoff

  cross_agent_coordinator:
    path: skills/cross_agent_coordinator
    description: "Multi-agent coordination via shared Letta memory"
    required: true
    operations:
      - post_finding
      - request_help
      - search_knowledge
      - share_config_change
      - register_task_completion

  knowledge_base:
    path: skills/knowledge_base
    description: "Structured knowledge capture and retrieval from Letta"
    required: false
    operations:
      - store_knowledge
      - search_knowledge
      - store_decision
      - store_runbook
      - store_adr
