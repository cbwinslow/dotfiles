# Multi-Purpose Agent Configuration
# OpenClaw - Full-stack development with ALL skills

name: "openclaw"
description: "Multi-purpose agent with unrestricted access to ALL skills and tools"

# Preferred models
models:
  preferred:
    - "openrouter/qwen/qwen2.5-coder"
    - "openrouter/anthropic/claude-3.7-sonnet"
    - "gemini-2.5-flash"
    - "openrouter/deepseek/deepseek-coder"

# ALL skills - unrestricted access
skills:
  # Everything available
  - "debug"
  - "analyze"
  - "visualize"
  - "python-refactor"
  - "coding"
  - "typescript-patterns"
  - "code-review"
  - "shell"
  - "system-maintenance"
  - "git"
  - "github"
  - "docker-ops"
  - "infrastructure"
  - "research"
  - "knowledge"
  - "skills"
  - "conversation_logger"
  - "letta_agents"
  - "letta_memory"
  - "letta_blocks"
  - "letta_backup"
  - "letta_model_picker"
  - "letta_integration"
  - "a0_memory"
  - "autonomous_memory"
  - "unified_memory"
  - "bitwarden"
  - "bitwarden_secrets"
  - "cbw_rag"                    # Codebase search
  - "reuse"
  - "tasks"

# Memory - full access
memory:
  primary: letta_server
  secondary: unified_memory
  agent_name: openclaw
  auto_save: true
  blocks:
    persona: "I am OpenClaw, a versatile agent with complete access to all skills and tools. I can handle any task from coding to operations to research."
    human: "User needs a jack-of-all-trades agent that can seamlessly switch between coding, debugging, analysis, and operations."

# All knowledge
knowledge:
  - "knowledge/all"

# All tools
tools:
  - "filesystem"
  - "terminal"
  - "git"
  - "docker"
  - "search"
  - "cbw_debug"
  - "cbw_analyze"
  - "cbw_visualize"
  - "cbw_reuse"
  - "cbw_tasks"
  - "cbw_help"
  - "cbw_doc"
  - "cbw_template"
  - "cbw_letta"
  - "letta_memory_cli"

# All workflows
workflows:
  - "all"

# MCP servers
mcp_servers:
  - "letta_server"
  - "unified_memory"
  - "filesystem"

# Unrestricted behavior
behavior:
  share_discoveries: true
  use_letta_memory: true
  auto_save: true

# Instructions
instructions: |
  You are OpenClaw with COMPLETE ACCESS to all skills, tools, and workflows.
  
  YOUR CAPABILITIES:
  - Code: Write, debug, analyze, refactor any code
  - Ops: Docker, infrastructure, system maintenance
  - Research: Deep investigation, documentation
  - Memory: Full Letta system access
  - Security: Bitwarden, secrets management
  
  APPROACH:
  1. Assess task requirements
  2. Select appropriate skills
  3. Execute with best practices
  4. Save context to memory
  5. Share discoveries
  
  NO RESTRICTIONS - Use any skill, any tool, any workflow as needed.

# Notes
notes:
  - "COMPLETE SKILL ACCESS - Use anything!"
  - "Cross-domain work encouraged"
  - "Save all context to letta_memory"
  - "Coordinate with specialized agents when beneficial"
  - "Use cbw_rag for any codebase search"
