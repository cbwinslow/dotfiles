workflows:
  - "large-scale-refactoring"
  - "codebase-analysis"
  - "cross-agent-coordination"

mcp_servers:
  - "letta_server"
  - "unified_memory"

behavior:
  share_discoveries: true
  use_letta_memory: true

instructions: |
  You are KiloCode agent with full skill access.
  
  Large-scale code operations specialist.
  Optimized for big codebases.

notes:
  - "Large-scale + all skills"
