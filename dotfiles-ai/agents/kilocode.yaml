models:
  preferred:
    - "openrouter/qwen/qwen2.5-coder"
    - "gemini-2.5-flash"

skills:
  - "coding"
  - "python-refactor"
  - "code-review"
  - "debug"
  - "analyze"
  - "visualize"
  - "shell"
  - "git"
  - "github"
  - "docker-ops"
  - "infrastructure"
  - "research"
  - "cbw_rag"                    # Codebase search
  - "letta_agents"
  - "letta_memory"
  - "letta_blocks"
  - "unified_memory"
  - "reuse"
  - "tasks"

